name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DOCKERHUB_NAMESPACE: ${{ secrets.DOCKERHUB_USERNAME }}

jobs:
  lint-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - name: Install backend dependencies
        working-directory: ./backend
        run: npm ci
      - name: Run ESLint
        working-directory: ./backend
        run: npm run lint

  lint-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci
      - name: Run ESLint
        working-directory: ./frontend
        run: npm run lint

  lint-worker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install flake8
        run: pip install flake8
      - name: Run flake8
        working-directory: ./worker
        run: flake8 .

  build-and-push:
    needs: [lint-backend, lint-frontend, lint-worker]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.vars.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v4
      - name: Set short SHA as image tag
        id: vars
        run: echo "image_tag=$(echo ${GITHUB_SHA} | cut -c1-7)" >> "$GITHUB_OUTPUT"
      - uses: docker/setup-buildx-action@v3
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.DOCKERHUB_NAMESPACE }}/ai-task-backend:${{ steps.vars.outputs.image_tag }}
            ${{ env.DOCKERHUB_NAMESPACE }}/ai-task-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build and push worker image
        uses: docker/build-push-action@v6
        with:
          context: ./worker
          push: true
          tags: |
            ${{ env.DOCKERHUB_NAMESPACE }}/ai-task-worker:${{ steps.vars.outputs.image_tag }}
            ${{ env.DOCKERHUB_NAMESPACE }}/ai-task-worker:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.DOCKERHUB_NAMESPACE }}/ai-task-frontend:${{ steps.vars.outputs.image_tag }}
            ${{ env.DOCKERHUB_NAMESPACE }}/ai-task-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  update-infra-repo:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout infra repository
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.INFRA_REPO }}
          token: ${{ secrets.INFRA_REPO_PAT }}
          path: infra
      - name: Update image tags in manifests
        working-directory: ./infra
        env:
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
          NAMESPACE: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          sed -i "s|image: .*ai-task-backend:.*|image: ${NAMESPACE}/ai-task-backend:${IMAGE_TAG}|g" k8s/backend-deployment.yaml
          sed -i "s|image: .*ai-task-worker:.*|image: ${NAMESPACE}/ai-task-worker:${IMAGE_TAG}|g" k8s/worker-deployment.yaml
          sed -i "s|image: .*ai-task-frontend:.*|image: ${NAMESPACE}/ai-task-frontend:${IMAGE_TAG}|g" k8s/frontend-deployment.yaml
      - name: Commit and push updated manifests
        working-directory: ./infra
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/*.yaml
          git diff --cached --quiet && echo "No changes to commit" || git commit -m "chore: bump image tags to ${{ needs.build-and-push.outputs.image_tag }}"
          git push